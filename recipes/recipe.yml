---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: cairos
description: An OS named after my cat.
base-image: quay.io/fedora-ostree-desktops/cosmic-atomic
image-version: 43

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - atim/starship
    install:
      packages:
        - vim
        - just
        - gh
        - tailscale
        - starship
        - fastfetch
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - ark

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        install:
          - app.zen_browser.zen
          - best.ellie.StartupConfiguration
          - com.github.PintaProject.Pinta
          - dev.cappsy.CosmicExtAppletLogoMenu
          - dev.edfloreshz.CosmicTweaks
          - io.github.cosmic_utils.camera
          - org.gnome.Loupe
      - notify: false
        scope: user

  - type: script
    scripts:
      - 00-image-info.sh
      - 10-core.sh
      - 99-cleanup.sh

  - type: signing

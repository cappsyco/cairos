---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: cairos
description: An OS named after my cat.
base-image: quay.io/fedora-ostree-desktops/cosmic-atomic
image-version: 43

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - atim/starship
    install:
      packages:
        - vim
        - gh
        - starship
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - ark

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        install:
          - app.zen_browser.zen
      - scope: user

  - type: signing
